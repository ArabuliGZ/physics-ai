<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Журнал учителя</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="/static/css/style.css?v=admin-skeleton-1">
    <link rel="icon" href="/static/favicon.png">
    <style>
        [hidden],
        .teacher-topbar-actions .teacher-link {
            display: none !important;
        }
    </style>
</head>
<body class="teacher-page">
    <div
        id="teacher_login_modal"
        class="student-modal"
        hidden
    >
        <form
            class="student-card"
            onsubmit="handleTeacherLogin(event)"
        >
            <h2>Вход учителя</h2>

            <input
                id="teacher_email"
                type="email"
                placeholder="teacher@test.ru"
                autocomplete="email"
            >

            <button
                id="teacher_login_button"
                type="submit"
            >
                Войти
            </button>

            <a
                class="student-teacher-link"
                href="/"
            >
                Войти как ученик
            </a>

            <p class="login-demo-hint">
                Учитель: teacher@test.ru · Админ: admin@test.ru
            </p>

            <div
                id="teacher_login_error"
                class="student-error"
            ></div>
        </form>
    </div>

    <div
        id="teacher_app"
        hidden
    >
        <header class="app-topbar teacher-topbar">
            <div class="teacher-topbar-main">
                <div class="app-brand">
                    <span class="app-brand-mark">P</span>

                    <div class="app-brand-text">
                        <strong>Physics AI</strong>
                        <span>Журнал учителя</span>
                    </div>
                </div>

            </div>

            <nav
                class="teacher-tabs"
                aria-label="Разделы кабинета учителя"
            >
                <button
                    type="button"
                    class="teacher-tab is-active"
                    data-teacher-tab="classes"
                    onclick="switchTeacherView('classes')"
                >
                    Мои классы
                </button>

                <button
                    type="button"
                    class="teacher-tab"
                    data-teacher-tab="journal"
                    onclick="switchTeacherView('journal')"
                >
                    Журнал
                </button>

                <button
                    type="button"
                    class="teacher-tab"
                    data-teacher-tab="admin"
                    data-admin-only="true"
                    onclick="switchTeacherView('admin')"
                    hidden
                >
                    Админ
                </button>
            </nav>

            <div class="teacher-topbar-actions">
                <a class="teacher-link" href="/">Войти как ученик</a>

                <div
                    id="teacher_user_name"
                    class="app-user-pill teacher-user-pill"
                ></div>

                <button
                    type="button"
                    class="teacher-secondary-button"
                    onclick="loadTeacherDashboard()"
                    hidden
                >
                    Обновить
                </button>

                <button
                    type="button"
                    class="teacher-logout-button"
                    onclick="logoutTeacher()"
                >
                Выйти
            </button>
        </div>
    </header>

        <section
            class="teacher-panel"
            data-teacher-view="classes"
        >
            <div class="teacher-panel-header">
                <div>
                    <h2>Мои классы</h2>
                </div>

                <div class="teacher-panel-header-actions">
                    <span id="teacher_import_result"></span>

                    <button
                        type="button"
                        class="teacher-secondary-button"
                        onclick="toggleTeacherCreateClassForm()"
                    >
                        Создать класс
                    </button>
                </div>
            </div>

            <div
                id="teacher_create_class_panel"
                class="teacher-create-class-panel"
                hidden
            >
                <form
                    class="teacher-import-form"
                    onsubmit="importTeacherStudents(event)"
                >
                    <div class="teacher-import-fields">
                        <label
                            class="teacher-import-teacher-field"
                            data-admin-only="true"
                            hidden
                        >
                            <span>Учитель</span>
                            <select id="teacher_import_teacher"></select>
                        </label>

                        <label class="teacher-import-common-field teacher-import-school-field">
                            <span>Школа</span>
                            <select
                                id="teacher_import_school"
                                required
                            ></select>
                        </label>

                        <label class="teacher-import-common-field">
                            <span>Параллель</span>
                            <select id="teacher_import_grade">
                                <option value="7">7 класс</option>
                                <option value="8">8 класс</option>
                                <option value="9">9 класс</option>
                                <option value="10">10 класс</option>
                            </select>
                        </label>

                        <label class="teacher-import-common-field">
                            <span>Класс</span>
                            <input
                                id="teacher_import_class_group"
                                type="text"
                                placeholder="А или 1"
                                required
                            >
                        </label>

                        <label class="teacher-import-common-field">
                            <span>База задач</span>
                            <select id="teacher_import_task_class"></select>
                        </label>
                    </div>

                    <div class="teacher-import-file-row">
                        <label>
                            <span>CSV</span>
                            <input
                                id="teacher_import_file"
                                type="file"
                                accept=".csv,text/csv"
                            >
                        </label>

                        <div class="teacher-import-actions">
                            <button
                                type="button"
                                class="teacher-secondary-button teacher-template-button"
                                onclick="downloadStudentCsvTemplate()"
                            >
                                Скачать шаблон
                            </button>

                            <button
                                id="teacher_import_button"
                                type="submit"
                                class="teacher-secondary-button"
                            >
                                Загрузить CSV
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div
                id="teacher_classes_list"
                class="teacher-classes-list"
            ></div>
        </section>

        <section
            class="teacher-panel teacher-journal-panel"
            data-teacher-view="journal"
            hidden
        >
            <div class="teacher-panel-header">
                <div>
                    <h2>Журнал</h2>
                </div>

                <div class="teacher-panel-header-actions">
                    <span id="teacher_journal_summary"></span>

                    <button
                        id="teacher_export_button"
                        type="button"
                        class="teacher-secondary-button"
                        onclick="downloadTeacherJournalCsv()"
                        disabled
                    >
                        Скачать CSV
                    </button>
                </div>
            </div>

            <div class="teacher-filters">
                <label>
                    <span>Школа</span>
                    <select
                        id="teacher_school_select"
                        onchange="handleTeacherSchoolChange()"
                    ></select>
                </label>

                <label>
                    <span>Класс</span>
                    <select
                        id="teacher_student_class_select"
                        onchange="handleTeacherClassChange()"
                    ></select>
                </label>
            </div>

            <div
                id="teacher_journal_table"
                class="teacher-journal-table"
            ></div>
        </section>

        <section
            class="teacher-panel"
            data-teacher-view="journal"
            hidden
        >
            <div class="teacher-panel-header">
                <div>
                    <h2>Добавить ученика в этот класс</h2>
                </div>

                <span id="teacher_single_result"></span>
            </div>

            <form
                class="teacher-single-form"
                onsubmit="addSingleTeacherStudent(event)"
            >
                <input
                    id="teacher_single_full_name"
                    type="text"
                    placeholder="ФИО"
                    required
                >

                <input
                    id="teacher_single_email"
                    type="email"
                    placeholder="email"
                    required
                >

                <button
                    id="teacher_single_button"
                    type="submit"
                    class="teacher-secondary-button"
                >
                    Добавить
                </button>
            </form>
        </section>

        <section
            class="teacher-panel"
            data-teacher-view="admin"
            hidden
        >
            <div class="teacher-panel-header">
                <div>
                    <h2>Админ</h2>
                </div>
            </div>

            <div class="teacher-admin-grid">
                <section class="teacher-admin-section">
                    <div class="teacher-admin-section-header">
                        <h3>Учителя</h3>
                    </div>

                    <form
                        class="teacher-admin-teacher-form"
                        onsubmit="upsertAdminTeacher(event)"
                    >
                        <input
                            id="admin_teacher_full_name"
                            type="text"
                            placeholder="ФИО"
                            required
                        >

                        <input
                            id="admin_teacher_email"
                            type="email"
                            placeholder="email"
                            required
                        >

                        <button
                            id="admin_teacher_button"
                            type="submit"
                            class="teacher-secondary-button"
                        >
                            Добавить
                        </button>

                        <button
                            id="admin_teacher_cancel"
                            type="button"
                            class="teacher-secondary-button"
                            onclick="cancelAdminTeacherEdit()"
                            hidden
                        >
                            Отмена
                        </button>

                        <span id="admin_teacher_result"></span>
                    </form>

                    <div
                        id="admin_teachers_table"
                        class="teacher-admin-table"
                    ></div>
                </section>

                <section class="teacher-admin-section">
                    <div class="teacher-admin-section-header">
                        <h3>Школы</h3>
                    </div>

                    <form
                        class="teacher-admin-school-form"
                        onsubmit="upsertAdminSchool(event)"
                    >
                        <input
                            id="admin_school_name"
                            type="text"
                            placeholder="Название школы"
                            required
                        >

                        <button
                            id="admin_school_button"
                            type="submit"
                            class="teacher-secondary-button"
                        >
                            Добавить
                        </button>

                        <button
                            id="admin_school_cancel"
                            type="button"
                            class="teacher-secondary-button"
                            onclick="cancelAdminSchoolEdit()"
                            hidden
                        >
                            Отмена
                        </button>

                        <span id="admin_school_result"></span>
                    </form>

                    <div
                        id="admin_schools_table"
                        class="teacher-admin-table"
                    ></div>
                </section>

                <section class="teacher-admin-section">
                    <div class="teacher-admin-section-header teacher-admin-section-header-stacked">
                        <h3>Классы</h3>

                        <div class="teacher-admin-filters" hidden>
                        <label class="teacher-admin-filter">
                            <span>Школа</span>
                            <select
                                id="admin_class_school_filter_old"
                                onchange="handleAdminClassFilterChange()"
                            ></select>
                        </label>

                        <label class="teacher-admin-filter">
                            <span>Учитель</span>
                            <select
                                id="admin_class_teacher_filter_old"
                                onchange="handleAdminClassFilterChange()"
                            ></select>
                        </label>
                        </div>
                    </div>

                    <button
                        type="button"
                        class="teacher-secondary-button teacher-admin-create-class-toggle"
                        onclick="toggleAdminCreateClassForm()"
                    >
                        Создать класс
                    </button>

                    <div
                        id="admin_create_class_panel"
                        class="teacher-create-class-panel teacher-admin-create-class-panel"
                        hidden
                    >
                        <form
                            class="teacher-import-form"
                            onsubmit="importAdminStudents(event)"
                        >
                            <div class="teacher-import-fields">
                                <label class="teacher-import-teacher-field">
                                    <span>Учитель</span>
                                    <select id="admin_import_teacher"></select>
                                </label>

                                <label class="teacher-import-common-field teacher-import-school-field">
                                    <span>Школа</span>
                                    <select
                                        id="admin_import_school"
                                        required
                                    ></select>
                                </label>

                                <label class="teacher-import-common-field">
                                    <span>Параллель</span>
                                    <select id="admin_import_grade">
                                        <option value="7">7 класс</option>
                                        <option value="8">8 класс</option>
                                        <option value="9">9 класс</option>
                                        <option value="10">10 класс</option>
                                    </select>
                                </label>

                                <label class="teacher-import-common-field">
                                    <span>Класс</span>
                                    <input
                                        id="admin_import_class_group"
                                        type="text"
                                        placeholder="А или 1"
                                        required
                                    >
                                </label>

                                <label class="teacher-import-common-field">
                                    <span>База задач</span>
                                    <select id="admin_import_task_class"></select>
                                </label>
                            </div>

                            <div class="teacher-import-file-row">
                                <label>
                                    <span>CSV</span>
                                    <input
                                        id="admin_import_file"
                                        type="file"
                                        accept=".csv,text/csv"
                                    >
                                </label>

                                <div class="teacher-import-actions">
                                    <button
                                        type="button"
                                        class="teacher-secondary-button teacher-template-button"
                                        onclick="downloadStudentCsvTemplate()"
                                    >
                                        Скачать шаблон
                                    </button>

                                    <button
                                        id="admin_import_button"
                                        type="submit"
                                        class="teacher-secondary-button"
                                    >
                                        Загрузить CSV
                                    </button>
                                </div>
                            </div>

                            <span id="admin_import_result"></span>
                        </form>
                    </div>

                    <div
                        id="admin_classes_table"
                        class="teacher-admin-table"
                    ></div>
                </section>
            </div>
        </section>
    </div>

    <div
        id="teacher_progress_dialog"
        class="teacher-dialog"
        hidden
    >
        <div
            class="teacher-dialog-backdrop"
            onclick="closeTeacherProgressDialog()"
        ></div>

        <section class="teacher-dialog-panel">
            <div class="teacher-dialog-header">
                <h2 id="teacher_progress_dialog_title">Задача</h2>

                <button
                    type="button"
                    class="teacher-dialog-close"
                    onclick="closeTeacherProgressDialog()"
                    aria-label="Закрыть"
                >
                    &times;
                </button>
            </div>

            <p id="teacher_progress_dialog_meta"></p>
            <p id="teacher_progress_dialog_status"></p>

            <div class="teacher-dialog-actions">
                <button
                    type="button"
                    class="teacher-secondary-button teacher-pass-button"
                    onclick="setTeacherProgressOverride(true)"
                >
                    Зачесть
                </button>

                <button
                    type="button"
                    class="teacher-secondary-button teacher-fail-button"
                    onclick="setTeacherProgressOverride(false)"
                >
                    Снять зачёт
                </button>
            </div>
        </section>
    </div>

    <script src="/static/js/teacher.js?v=admin-skeleton-1"></script>
</body>
</html>
