<!DOCTYPE html>

<!-- ========================================= -->
<!-- ===== Р“Р›РђР’РќРђРЇ HTML РЎРўР РђРќРР¦Рђ РЎРђР™РўРђ ===== -->

<html lang="ru"> 

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet"
    />


    <!-- РљРѕРґРёСЂРѕРІРєР° UTF-8 -->
    <meta charset="UTF-8">

    <!-- Р—Р°РіРѕР»РѕРІРѕРє РІРєР»Р°РґРєРё Р±СЂР°СѓР·РµСЂР° -->
    <title>AI-проверка физики</title>

    <!-- ================================= -->
    <!-- ===== CSS РЎРўРР›Р РЎРўР РђРќРР¦Р« ===== -->
    <!-- ================================= -->

    <link
        rel="stylesheet"
        href="/static/css/style.css?v=login-hint-1"
    />


    <!-- ================================= -->
    <!-- ===== РќРђРЎРўР РћР™РљРђ MATHJAX ===== -->
    <!-- ================================= -->



<script>

window.MathJax = {

    tex: {

        /* Р¤РѕСЂРјСѓР»С‹ РІРёРґР° $ ... $ */
        inlineMath: [
            ['$', '$'],
            ['\\(', '\\)']
        ],
        displayMath: [
            ['$$', '$$'],
            ['\\[', '\\]']
        ],
        
        /* РЎРѕР±СЃС‚РІРµРЅРЅС‹Рµ LaTeX РєРѕРјР°РЅРґС‹ */
        macros: {

            degree: "\, ^{\\circ}"
        }
    }
};

</script>

<script
src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>


</head>

<link
    rel="icon"
    href="/static/favicon.png"
>

<!-- ================================= -->
<!-- ===== РўР•Р›Рћ РЎРўР РђРќРР¦Р« ===== -->
<!-- ================================= -->

<body>

    <header
        id="student_bar"
        class="app-topbar student-bar"
        hidden
    >
        <div class="app-brand">
            <span class="app-brand-mark">P</span>

            <div class="app-brand-text">
                <strong>Physics AI</strong>
                <span>Кабинет ученика</span>
            </div>
        </div>

        <div class="app-topbar-actions">
            <span id="student_name" class="app-user-pill"></span>

            <button
                type="button"
                class="student-logout"
                onclick="logoutStudent()"
            >
                Выйти
            </button>
        </div>
    </header>

    <div
        id="student_modal"
        class="student-modal"
        hidden
    >
        <form
            class="student-card"
            onsubmit="handleStudentLogin(event)"
        >
            <h2>Вход ученика</h2>

            <input
                id="student_email"
                type="email"
                placeholder="Email"
                autocomplete="email"
            >

            <button
                id="student_login_button"
                type="submit"
            >
                Войти
            </button>

            <a
                class="student-teacher-link"
                href="/teacher?logout=1"
            >
                Войти как учитель
            </a>

            <p class="login-demo-hint">
                Для теста: 7@test.ru, 8@test.ru, 9@test.ru
            </p>

            <div
                id="student_login_error"
                class="student-error"
            ></div>
        </form>
    </div>

    <div class="layout">

    <!-- ================================= -->
    <!-- ===== РћР‘Р›РђРЎРўР¬ Р§РђРўРђ ===== -->
    <!-- ================================= -->

    <div class="left-column">
        
        <!-- ================================= -->
        <!-- ===== Р’Р«Р‘РћР  Р—РђР”РђР§Р ===== -->
        <!-- ================================= -->

        <div class="block">

            <!-- ================================= -->
            <!-- ===== РЈРЎР›РћР’РР• Р—РђР”РђР§Р ===== -->
            <!-- ================================= -->

            <div class="block">

                <!-- ===== РћРўРћР‘Р РђР–Р•РќРР• Р’Р«Р‘Р РђРќРќРћР™ Р—РђР”РђР§Р ===== -->

                <div
                    id="problem_view"
                    class="block"
                ></div>


                <!-- ===== Р‘Р›РћРљ Р”Р›РЇ РљРђР РўРРќРљР ===== -->

                <div
                    id="problem_image"

                    style="
                        margin-top:20px;
                        text-align:center;
                    "
                ></div>

            </div>


            <!-- ================================= -->
            <!-- ===== Р’Р«Р‘РћР  РР— Р‘РђР—Р« ===== -->
            <!-- ================================= -->

            <div id="select_block">

                <h3>Выбор задачи</h3>


                <!-- ===== Р’Р«Р‘РћР  РљР›РђРЎРЎРђ ===== -->

                <select
                    id="group_select"
                    onchange="fillChapters()"
                ></select>


                <!-- ===== Р’Р«Р‘РћР  Р“Р›РђР’Р« ===== -->

                <select
                    id="chapter_select"
                    onchange="fillTopics()"
                ></select>


                <!-- ===== Р’Р«Р‘РћР  РўР•РњР« ===== -->

                <select
                    id="topic_select"
                    onchange="fillTasks()"
                ></select>


                <!-- ===== Р’Р«Р‘РћР  РќРћРњР•Р Рђ Р—РђР”РђР§Р ===== -->

                <select
                    id="task_select"
                    onchange="showSelectedTask()"
                ></select>

            </div>

        </div>
    </div>
 
    
<div class="right-column">

    <!-- ================================= -->
    <!-- ===== РћР‘Р›РђРЎРўР¬ Р§РђРўРђ ===== -->
    <!-- ================================= -->

    <div class="chat" id="chat"></div>

    <!-- ================================= -->
    <!-- ===== РћР‘Р›РђРЎРўР¬ Р’Р’РћР”Рђ ===== -->
    <!-- ================================= -->

    <div class="input-area">

        <div id="imagePreview"></div>

            <div class="input-wrapper">

            <label class="upload-button">

                <input
                    type="file"
                    id="imageInput"
                    accept="image/*"
                    hidden
                >

                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                >

                    <path
                        d="M21.44 11.05L12.25 20.24C11.1247 21.3653 9.59848 21.9975 8.0075 21.9975C6.41652 21.9975 4.8903 21.3653 3.765 20.24C2.6397 19.1147 2.00757 17.5885 2.00757 15.9975C2.00757 14.4065 2.6397 12.8803 3.765 11.755L12.955 2.565C13.7056 1.81433 14.7237 1.39258 15.785 1.39258C16.8463 1.39258 17.8644 1.81433 18.615 2.565C19.3657 3.31566 19.7874 4.3337 19.7874 5.395C19.7874 6.4563 19.3657 7.47434 18.615 8.225L9.415 17.415C9.03967 17.7903 8.53061 18.0011 8 18.0011C7.4694 18.0011 6.96034 17.7903 6.585 17.415C6.20967 17.0397 5.99884 16.5306 5.99884 16C5.99884 15.4693 6.20967 14.9603 6.585 14.585L15.07 6.1"
                        stroke="#6b7280"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    />

                </svg>

            </label>

                <textarea
                    id="solution"
                    rows="1"
                    onkeydown="handleEnter(event)"
                    oninput="autoResize(this)"
                ></textarea>

                <button
                    class="send-button"
                    onclick="checkSolution()"
                >

                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="18"
                        height="18"
                        viewBox="0 0 24 24"
                        fill="none"
                    >

                        <path
                            d="M5 12H19"
                            stroke="white"
                            stroke-width="2"
                            stroke-linecap="round"
                        />

                        <path
                            d="M13 6L19 12L13 18"
                            stroke="white"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />

                    </svg>

                </button>

            
        </div>       
    </div>

</div>

</div>

    <div
        id="progress_block"
        class="progress-block"
    >
        <div class="progress-header">
            <h3>Мои задачи</h3>
            <span id="progress_summary"></span>
        </div>

        <div
            id="progress_table"
            class="progress-table"
        ></div>
    </div>

<script src="/static/js/state.js"></script>

<script src="/static/js/ui.js"></script>

<script src="/static/js/tasks.js"></script>

<script src="/static/js/chat.js"></script>

<script src="/static/js/students.js?v=auth-exit-2"></script>

<script src="/static/js/main.js"></script>

</body>

</html>
